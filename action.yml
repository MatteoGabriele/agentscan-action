name: "AgentScan"
description: "Detects automation patterns on GitHub"
author: "Matteo Gabriele"
inputs:
  github-token:
    description: "GitHub token"
    required: true
  skip-members:
    description: "Comma-separated list of usernames to skip from scanning"
    required: false
    default: ""
  agent-scan-comment:
    description: "Whether to enable AgentScan commenting on the issue or PR. True by default. You can disable this if you only want to use the outputs and not have the action comment on the issue or PR."
    required: false
    default: "true"
outputs:
  flagged:
    description: "Whether the account was flagged"
  classification:
    description: "Classification result: organic, mixed, or automation"
  score:
    description: "Numeric score from 0 to 100"
  community-flagged:
    description: "Whether the account is on the community verified automations list"
  flags:
    description: "JSON array of flag objects with label, points, and detail"
  account-age:
    description: "Account age in days"
  username:
    description: "The GitHub username that was analyzed"
branding:
  icon: "activity"
  color: "white"
runs:
  using: "node24"
  main: "dist/index.mjs"
